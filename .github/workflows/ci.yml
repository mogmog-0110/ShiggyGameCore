name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: msvc-debug
            name: MSVC
          - os: ubuntu-latest
            preset: gcc-debug
            name: GCC
            install: g++-12
          - os: ubuntu-latest
            preset: clang-debug
            name: Clang
            install: clang-15

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler (Linux)
        if: matrix.install
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.install }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ matrix.name }}-deps-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: ${{ matrix.name }}-deps-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-15 clang-tidy-15
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-15 100

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: clang-tidy-deps-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: clang-tidy-deps-

      - name: Configure
        run: cmake --preset ci-clang-tidy

      - name: Build with clang-tidy
        run: cmake --build build
