name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: msvc-debug
            name: MSVC
          - os: ubuntu-latest
            preset: gcc-debug
            name: GCC
            install: g++-13
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-latest
            preset: clang-debug
            name: Clang
            install: "clang-18 libc++-18-dev libc++abi-18-dev"
            cc: clang-18
            cxx: clang++-18

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler (Linux)
        if: matrix.install
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.install }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ matrix.name }}-deps-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: ${{ matrix.name }}-deps-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
        env:
          CC: ${{ matrix.cc || '' }}
          CXX: ${{ matrix.cxx || '' }}

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.name }}
          path: build/Testing/

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 clang-tidy-18 libc++-18-dev libc++abi-18-dev
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-18 100

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: clang-tidy-deps-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: clang-tidy-deps-

      - name: Configure
        run: cmake --preset ci-clang-tidy

      - name: Build with clang-tidy
        run: cmake --build build
